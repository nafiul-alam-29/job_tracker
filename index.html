<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- tailwind cdn -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <title>Job Tracker</title>

</head>
<body class="bg-[#F8FAFC] ">
     <header class="w-[80%] mx-auto space-y-6">
        <h1 class="text-6xl font-bold text-blue-200 ">Job Interview Tracker</h1>
        <div class="grid grid-cols-3 gap-8">
            <div class="bg-white p-4 rounded-md shadow-slate-300 shadow-md">
                <p>Total</p>
                <p id="total" class="text-2xl">0</p>
            </div>

            <div class="bg-white p-4 rounded-md shadow-slate-300 shadow-md">
                <p>Interview </p>
                <p id="interviewCount" class="text-green-400 text-2xl">0</p>
            </div>

            <div class="bg-white p-4 rounded-md shadow-slate-300 shadow-md">
                <p>Rejected</p>
                <p id="rejectCount" class="text-red-400 text-2xl">0</p>
            </div>
        </div>
    </header>

    <hr class="w-[80%] mx-auto my-7 text-slate-300">
   
    
</body>
</html>
